  <text x="102" y="52" font-family="'Space Mono', 'Courier New', monospace" font-size="28" font-weight="700" fill="#F0EEE8" letter-spacing="-0.5">forwardslash</text>
  <!-- Sub-label -->
  <text x="104" y="68" font-family="'Space Mono', 'Courier New', monospace" font-size="10" font-weight="400" fill="#F0EEE8" letter-spacing="3" opacity="0.45">DEVELOPMENT</text>
