<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A0B"/>
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5B0" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Signal accent bar -->
  <rect x="80" y="80" width="4" height="470" fill="#00E5B0" rx="2"/>
  <!-- // mark -->
  <text x="120" y="320" font-family="'Courier New', monospace" font-size="240" font-weight="700" fill="#00E5B0" letter-spacing="-16" opacity="0.15">//</text>
  <!-- Wordmark -->
  <text x="120" y="340" font-family="'Courier New', monospace" font-size="96" font-weight="700" fill="#F0EEE8" letter-spacing="-4">forwardslash</text>
  <!-- Sub -->
  <text x="122" y="400" font-family="'Courier New', monospace" font-size="28" font-weight="400" fill="#F0EEE8" letter-spacing="8" opacity="0.45">DEVELOPMENT</text>
  <!-- Tagline -->
  <text x="122" y="490" font-family="'Courier New', monospace" font-size="24" font-weight="400" fill="#00E5B0" opacity="0.8">// engineered to last.</text>
  <!-- URL -->
  <text x="122" y="540" font-family="'Courier New', monospace" font-size="20" fill="#F0EEE8" opacity="0.3">forwardslash-development.github.io/forwardslash-brand</text>
</svg>
